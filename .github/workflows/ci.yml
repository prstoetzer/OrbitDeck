name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,accurate]"

      - name: Lint (ruff)
        run: ruff check orbitdeck tests

      - name: Run tests
        run: pytest -q

  # A second job that runs the suite WITHOUT the optional sgp4 backend, to
  # guarantee the vendored pure-Python propagator stays correct on its own.
  test-no-sgp4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests (vendored SGP4 only)
        run: pytest -q
