# Flatpak manifest for OrbitDeck.
#
# Builds OrbitDeck and its Python dependencies against the Freedesktop runtime,
# so the resulting Flatpak runs on any distro with Flatpak installed. The full
# optional set (sgp4, openpyxl) is included; cartopy is intentionally omitted
# here because its GEOS/PROJ build is heavy inside the runtime -- OrbitDeck falls
# back to its bundled coastlines, which is acceptable for a portable bundle.
#
# Dependency wheels are pulled at build time. For a fully offline/reproducible
# Flathub submission, replace the pip module below with pinned source modules
# generated by flatpak-pip-generator (see packaging/PACKAGING.md).
app-id: io.github.prstoetzer.OrbitDeck
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: orbitdeck
finish-args:
  - --share=network          # live GP / transponder / space-wx fetches
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home        # save printable PDFs / CSV exports, ~/.orbitdeck

modules:
  - name: python-deps
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation
        matplotlib numpy certifi sgp4 openpyxl
    # NOTE: this pulls wheels from PyPI at build time. For Flathub, swap this
    # module for pinned source modules from flatpak-pip-generator.

  - name: orbitdeck
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
      - install -Dm644 packaging/orbitdeck.desktop
        /app/share/applications/io.github.prstoetzer.OrbitDeck.desktop
      - install -Dm644 orbitdeck/gui/assets/icon-256.png
        /app/share/icons/hicolor/256x256/apps/io.github.prstoetzer.OrbitDeck.png
      - install -Dm644 packaging/io.github.prstoetzer.OrbitDeck.metainfo.xml
        /app/share/metainfo/io.github.prstoetzer.OrbitDeck.metainfo.xml
    sources:
      - type: dir
        path: ../..
